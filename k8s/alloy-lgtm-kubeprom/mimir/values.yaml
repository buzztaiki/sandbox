mimir:
  structuredConfig:
    limits:
      # デフォルトの20では monitoring-mixin の rule は収まらない
      ruler_max_rules_per_rule_group: 30

      # デフォルトの150000では色々やっていると全然足らない
      max_global_series_per_user: 300000

      # https://grafana.com/docs/mimir/latest/manage/use-exemplars/store-exemplars/
      # > Start with a relatively low number (100,000) and adjust it if needed.
      max_global_exemplars_per_user: 100000

      # https://grafana.com/docs/mimir/latest/configure/configure-native-histograms-ingestion/#configure-native-histograms-globally
      # > The recommended value is 160 which is the default in the OpenTelemetry SDK for exponential histograms.
      native_histograms_ingestion_enabled: true
      max_native_histogram_buckets: 160
    alertmanager_storage:
      backend: s3
      s3: &s3
        bucket_name: mimir-alertmanager
        endpoint: minio.minio.svc:9000
        insecure: true
        access_key_id: sandbox
        secret_access_key: supersecret
    blocks_storage:
      backend: s3
      s3:
        <<: *s3
        bucket_name: mimir-tsdb
      tsdb:
        flush_blocks_on_shutdown: true
    ruler_storage:
      backend: s3
      s3:
        <<: *s3
        bucket_name: mimir-ruler
    ingester:
      ring:
        replication_factor: 1 # dev:1, prod:3
    alertmanager:
      sharding_ring:
        replication_factor: 1 # dev:1, prod:3
    store_gateway:
      sharding_ring:
        replication_factor: 1 # dev:1, prod:1 or 3

metaMonitoring:
  dashboards:
    enabled: true
  serviceMonitor:
    enabled: true
    clusterLabel: null
  prometheusRule:
    enabled: true
    mimirAlerts: true
    mimirRules: true

minio:
  enabled: false
