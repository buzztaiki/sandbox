services:
  nodeapi:
    build: ./nodeapi
    ports:
      - "3000:3000"
    volumes:
      - ./nodeapi/src:/app/src
    environment:
      SENTRY_DSN: ${SENTRY_DSN}
      NEXT_URL: http://pyapi:8000

  pyapi:
    build: ./pyapi
    ports:
      - "8000:8000"
    volumes:
      - ./pyapi/main.py:/app/main.py
    environment:
      SENTRY_DSN: ${SENTRY_DSN}
      NEXT_URL: http://nodeapi:3000

  otel-collector:
    image: otel/opentelemetry-collector-contrib:latest
    volumes:
      - ./otel-collector/config.yaml:/etc/otelcol-contrib/config.yaml
    depends_on:
      - jaeger

  jaeger:
    image: jaegertracing/jaeger:latest
    ports:
      - "16686:16686"

  prometheus:
    image: prom/prometheus:latest
    volumes:
      - ./prometheus/prometheus.yml:/etc/prometheus/prometheus.yml
    ports:
      - "9090:9090"
    depends_on:
      - otel-collector
